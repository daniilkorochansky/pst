name: Compile PST Documents to PDF

on:
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc and PDF engines
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc weasyprint

      # Тщательная очистка файла и подготовка контента
      - name: Prepare Clean Introduction from README
        run: |
          # Пытаемся обработать как русский, так и английский README, если они есть
          TARGET_FILE="README.md"

          # 1. Вырезаем многострочный блок с разметкой div
          sed -e '/<div align="center">/,/<\/div>/d' "$TARGET_FILE" > temp_intro.md
          
          # 2. Жестко вырезаем остатки строки с языками и бейджи
          grep -v -E "(\[English|Русский|\[English \/ Русский\]|license|status|documents|contribution|discussion)" temp_intro.md > clean_intro.md
          
          # 3. Добавляем валидный разрыв страницы через HTML-совместимый тег
          echo -e "\n<div style=\"page-break-after: always;\"></div>" >> clean_intro.md

      # Настройка CSS: дата строго на первой странице
      - name: Create PDF Custom Stylesheet
        run: |
          CURRENT_DATE=$(date +'%d-%b-%Y')
          cat << EOF > pdf-style.css
          /* Базовая страница без колонтитулов */
          @page {
              size: A4;
              margin: 1in;
          }

          /* Дата отображается ТОЛЬКО на первой странице в левом верхнем углу */
          @page :first {
              @top-left {
                  content: "Generated: $CURRENT_DATE";
                  font-family: "DejaVu Sans", sans-serif;
                  font-size: 9px;
                  color: #555555;
              }
          }

          body {
              font-family: "DejaVu Sans", sans-serif;
              color: #000000;
              line-height: 1.6;
          }
          
          h1, h2, h3, h4 {
              color: #000000;
              margin-top: 24px;
          }
          
          h1 {
              border-bottom: 1px solid #cccccc;
              padding-bottom: 6px;
          }
          
          #TOC {
              margin-bottom: 30px;
              padding: 10px 0;
          }
          #TOC a {
              color: #000000;
              text-decoration: underline;
          }
          #TOC li {
              list-style-type: none;
              margin-bottom: 6px;
          }
          
          pre {
              background-color: #f6f8fa;
              border: 1px solid #e1e4e8;
              border-radius: 4px;
              padding: 12px;
              font-family: "DejaVu Sans Mono", monospace;
              font-size: 11px;
              white-space: pre-wrap;
          }
          
          blockquote {
              border-left: 4px solid #cccccc;
              color: #555555;
              padding-left: 12px;
              margin-left: 0;
          }
          EOF

      # Собираем PDF с динамическим именем файла, содержащим дату
      - name: Compile Markdown to PDF
        run: |
          FILE_DATE=$(date +'%Y-%m-%d')
          pandoc clean_intro.md pst/pst-*.md \
            -f gfm \
            -o "pst-specification-${FILE_DATE}.pdf" \
            --toc \
            --toc-depth=2 \
            --pdf-engine=weasyprint \
            -c pdf-style.css

      # Скачиваемый архив на GitHub тоже будет содержать дату в имени
      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "pst-specification-$(date +'%Y-%m-%d')"
          path: pst-specification-*.pdf
