name: Compile PST Documents to PDF

on:
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc and PDF engines
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc weasyprint

      # Надежная очистка README от бейджей, картинок и переключателей языков
      - name: Prepare Clean Introduction from README
        run: |
          # 1. Удаляем строки, содержащие markdown-ссылки на изображения (бейджи)
          # 2. Удаляем строку с выбором языков (чувствительно к регистру и пробелам)
          grep -v -E "(\!\[|img\.shields|license|status|contribution|discussion|English.*Russian|Русский)" README.md > clean_intro.md
          
          # Добавляем разрыв страницы в конец введения
          echo -e "\n\pagebreak" >> clean_intro.md

      # Создаем CSS-стиль: заголовки черные, у ссылок в оглавлении есть подчеркивание
      - name: Create PDF Custom Stylesheet
        run: |
          cat << 'EOF' > pdf-style.css
          body {
              font-family: "DejaVu Sans", sans-serif;
              color: #000000;
              line-height: 1.6;
          }
          
          /* Строгий черный цвет для всех заголовков */
          h1, h2, h3, h4 {
              color: #000000;
          }
          
          h1 {
              border-bottom: 1px solid #cccccc;
              padding-bottom: 6px;
              margin-top: 30px;
          }
          
          /* Оформление оглавления с нижним подчеркиванием у ссылок */
          #TOC {
              margin-bottom: 30px;
              padding: 10px 0;
          }
          #TOC a {
              color: #000000;
              text-decoration: underline; /* Добавлено нижнее подчеркивание */
          }
          #TOC li {
              list-style-type: none;
              margin-bottom: 6px;
          }
          
          /* Классические блоки для кода Pawn */
          pre {
              background-color: #f6f8fa;
              border: 1px solid #e1e4e8;
              border-radius: 4px;
              padding: 12px;
              font-family: "DejaVu Sans Mono", monospace;
              font-size: 12px;
          }
          
          blockquote {
              border-left: 4px solid #cccccc;
              color: #555555;
              padding-left: 12px;
              margin-left: 0;
          }
          EOF

      # Собираем PDF с использованием строгой темы
      - name: Compile Markdown to PDF
        run: |
          pandoc clean_intro.md pst/pst-*.md \
            -o pst-specification.pdf \
            --toc \
            --toc-depth=2 \
            --pdf-engine=weasyprint \
            -c pdf-style.css \
            -V geometry:margin=1in

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pst-specification
          path: pst-specification.pdf
